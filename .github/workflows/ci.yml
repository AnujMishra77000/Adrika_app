name: CI

on:
  push:
    branches: ["main", "develop", "codex/**"]
  pull_request:
    branches: ["*"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: adr_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d adr_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check app tests

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/adr_platform
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret
          CORS_ORIGINS: http://localhost:3000
        run: pytest
